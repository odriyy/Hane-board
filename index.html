<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hane Board</title>
</head>
<body>
  <h1>Waiting for task...</h1>

  <script>
    const espIP = "10.72.225.90";

    async function checkESP() {
      try {
        const res = await fetch(`http://${espIP}/page`);
        const page = (await res.text()).trim();

        if (page) {
          window.location.href = page;
        }
      } catch (e) {
        console.log("ESP32 not reachable");
      }
    }

    setInterval(checkESP, 1000);
  </script>
</body>
</html>
