<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hane Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="page-header">
            <div class="title-group">
                <h1 class="mb-0">Hane Dashboard</h1>
                <div class="text-muted subtitle-text">PUZZLE-BASED TASK DISPATCH & TRAINING SYSTEM</div>
            </div>
            <div class="header-actions">
                <button class="btn-primary" onclick="openModal()">+ Add Worker</button>
                <button class="btn-primary btn-secondary" onclick="window.location.href='csr.html'">CSR Data</button>
            </div>
        </header>

        <main class="worker-list" id="worker-list-container"></main>
    </div>

    <div id="add-worker-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Add New Trainee</h2>
            <input type="text" id="new-name" class="modal-input" placeholder="Worker Name">
            <div class="modal-actions">
                <button class="btn-primary btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-primary btn-confirm" onclick="submitNewWorker()">Create Record</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
