<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order UI Rebuild</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="ui-container" id="order-board">
            
            <h1 class="header-title">Order: 1</h1>

        <div class="top-banner">
            <div class="side-column">
                <div class="small-square"></div>
                <div class="small-square"></div>
            </div>
            
            <div class="center-rectangle"></div>
            
            <div class="side-column">
                <div class="small-square"></div>
                <div class="small-square"></div>
            </div>
        </div>

        <div class="grid-section">
           <div class="large-square"> <span class="square-number">1</span></div>
            <div class="large-square"> <span class="square-number">2</span></div>
            <div class="large-square"> <span class="square-number">3</span></div>
            <div class="large-square"> <span class="square-number">4</span></div>
        </div>
    
        </div> <!-- .ui-container -->
    </div> <!-- .app-wrapper -->

</body>
</html>
