<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Profile - Hane Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="page-header">
            <button class="btn-primary" onclick="window.location.href='index.html'">← Back to Directory</button>
        </header>
       <main class="worker-main">
    <div id="worker-name-title" class="profile-name">Loading...</div>
    <div class="eval-subtitle">Evaluate Latest Order</div>

    <div class="eval-grid">
        
        <div class="eval-box">
            <strong>Assigned Task</strong>
            <select id="task-assign-inline" class="eval-select" onchange="updateTaskMemory(); generateRealisticTime();">
                <option value="Babyccino">Babyccino</option>
                <option value="Black Americano">Black Americano</option>
                <option value="Double Espresso">Double Espresso</option>
                <option value="French Mint">French Mint</option>
                <option value="Matcha">Matcha</option>
                <option value="Mocha">Mocha</option>
                <option value="Spiced Chai">Spiced Chai</option>
                <option value="White Latte">White Latte</option>
            </select>
            <div class="time-display" id="task-time-display">Time: --:--</div>
        </div>

        <div class="eval-box">
            <strong>Rate Food Quality</strong>
            <div class="stars" id="star-rating">
                <span onclick="setRating(1)">★</span>
                <span onclick="setRating(2)">★</span>
                <span onclick="setRating(3)">★</span>
                <span onclick="setRating(4)">★</span>
                <span onclick="setRating(5)">★</span>
            </div>
        </div>

        <div class="eval-box">
            <strong>Improvement</strong>
            <select id="improvement-select" class="eval-select">
                <option value="">Select Category...</option>
                <option value="Milk Texture">Milk Texture</option>
                <option value="Recipe Accuracy">Recipe Accuracy</option>
                <option value="Pouring & Presentation">Pouring & Presentation</option>
                <option value="Speed & Pacing">Speed & Pacing</option>
                <option value="Station Organization">Station Organization</option>
                <option value="Cleaning & Hygiene">Cleaning & Hygiene</option>
                <option value="Customer Engagement">Customer Engagement</option>
                <option value="Team Communication">Team Communication</option>
                <option value="Redo Training">Redo Training</option>
            </select>
        </div>

    </div> <div class="center-action" style="gap: 15px; margin-top: 2rem;">
        <button class="btn-primary btn-danger" onclick="deleteThisWorker()">Delete Worker</button>
        <button class="btn-primary" onclick="saveAuditRecord()">Save Audit Record</button>
    </div>
</main>

    <script src="worker.js"></script>
</body>
</html>
