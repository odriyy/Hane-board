<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolate Sicilian Orange</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="ui-container" id="order-board">
            
            <h1 class="header-title">Chocolate Sicilian Orange</h1>

        <div class="top-banner">
            <div class="side-column">
                <div class="small-square"></div>
                <div class="small-square"></div>
            </div>
            
            <div class="center-rectangle">
                <img src="images/chocolate_sicilian_orange.png" alt="Chocolate Sicilian Orange">
            </div>

            <div class="side-column">
                <div class="small-square"></div>
                <div class="small-square"></div>
            </div>
        </div>

       <div class="grid-section">
           <div class="large-square"> 
                <span class="square-number">1</span>
                <img src="images/step1_cso.png" alt="Step 1">
            </div>
            <div class="large-square"> <span class="square-number">2</span>
                <img src="images/step2_cso.png" alt="Step 2">
            </div>
            <div class="large-square"> <span class="square-number">3</span>
                <img src="images/step3_cso.png" alt="Step 3">
            </div>
            <div class="large-square"> <span class="square-number">4</span>
                <img src="images/step4_cso.png" alt="Step 4">
            </div>
             <div class="large-square"> <span class="square-number">5</span>
                <img src="images/step5_cso.png" alt="Step 5">
            </div>
             <div class="large-square"> <span class="square-number">6</span>
                <img src="images/step6_cso.png" alt="Step 6">
            </div>
        </div>

        </div> <!-- .ui-container -->
    </div> <!-- .app-wrapper -->

</body>
</html>
